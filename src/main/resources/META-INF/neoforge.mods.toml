modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description='''Allows MekaSuit damage absorption to work on non-player entities (like maids from TouhouLittleMaid).'''

[[dependencies.${mod_id}]]
modId="neoforge"
mandatory=true
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="mekanism"
mandatory=true
versionRange="[10.7,)"
ordering="AFTER"
side="BOTH"

[[mixins]]
config="mekalivingextension.mixins.json"